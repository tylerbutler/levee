name: Client npm Publish

on:
  workflow_dispatch:
    inputs:
      tags:
        description: 'Space-separated list of tags to publish and release (e.g. "levee-driver/v0.1.0 levee-client/v0.1.0")'
        required: true
        type: string

permissions:
  contents: write
  id-token: write
  attestations: write

jobs:
  npm-publish:
    name: Publish to npm
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Setup Node.js
        uses: tylerbutler/actions/setup-node@d6442585b31f72e73b950f455deab089211ef1ed # ratchet:tylerbutler/actions/setup-node@main
        with:
          working-directory: client
          install-just: false

      - name: Build
        working-directory: client
        run: pnpm build

      - name: Configure npm for publishing
        working-directory: client
        run: |
          echo "//registry.npmjs.org/:_authToken=\${NPM_TOKEN}" >> .npmrc

      - name: Publish to npm
        working-directory: client
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: pnpm ci:publish

      - name: Report published packages
        if: always()
        working-directory: client
        run: |
          if [ -f pnpm-publish-summary.json ]; then
            echo "### Published Packages" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```json' >> "$GITHUB_STEP_SUMMARY"
            cat pnpm-publish-summary.json >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Create GitHub Releases
        env:
          GH_TOKEN: ${{ github.token }}
          TAGS: ${{ inputs.tags }}
        working-directory: client
        run: |
          CHANGES_DIR=$(grep '^changesDir:' .changie.yaml | awk '{print $2}' || echo ".changes")
          SEP=$(grep '^projectsVersionSeparator:' .changie.yaml | awk '{print $2}' | tr -d "\"'" 2>/dev/null || true)
          SEP="${SEP:-/}"

          for tag in $TAGS; do
            # Extract project and version suffix from tag (e.g. levee-driver/v0.1.0)
            project="${tag%${SEP}*}"
            ver_suffix="${tag#*${SEP}}"
            NOTES_FILE="${CHANGES_DIR}/${project}/${ver_suffix}.md"

            echo "Creating release for $tag"
            if [ -f "$NOTES_FILE" ]; then
              gh release create "$tag" --title "$tag" --notes-file "$NOTES_FILE"
            else
              gh release create "$tag" --title "$tag" --generate-notes
            fi
          done
