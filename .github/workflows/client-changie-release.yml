name: Client Release PR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - uses: tylerbutler/actions/changie-release@4dd5edb0cc1d941b6db7433504e406c001eea748 # ratchet:tylerbutler/actions/changie-release@main
        id: release
        with:
          token: ${{ secrets.RELEASE_PAT }}
          working-directory: client
          labels: release:client
          pr-title-template: 'Release client {version}'
          branch-template: 'release/client-{version}'
          commit-message-template: 'chore(client): release {version}'

      - name: Bump package.json versions
        if: steps.release.outputs.skipped != 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
          PR_BRANCH: ${{ steps.release.outputs.pr-branch }}
        shell: bash
        run: |
          SEMVER="${VERSION#v}"

          for pkg in client/packages/levee-driver client/packages/levee-client client/packages/levee-example client/packages/levee-presence-tracker; do
            jq --tab --arg v "$SEMVER" '.version = $v' "$pkg/package.json" > "$pkg/package.json.tmp"
            mv "$pkg/package.json.tmp" "$pkg/package.json"
          done

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout "$PR_BRANCH"
          git add client/packages/*/package.json
          if ! git diff --cached --quiet; then
            git commit -m "chore(client): bump package versions to ${SEMVER}"
            git push origin "$PR_BRANCH"
          fi

      - name: Summary
        if: steps.release.outputs.skipped != 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
          PR_URL: ${{ steps.release.outputs.pr-url }}
          PR_OP: ${{ steps.release.outputs.pr-operation }}
        run: |
          echo "### Client Release PR" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** $VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PR:** $PR_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Operation:** $PR_OP" >> "$GITHUB_STEP_SUMMARY"

      - name: Skipped
        if: steps.release.outputs.skipped == 'true'
        run: |
          echo "### Client Release Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No unreleased client change fragments found." >> "$GITHUB_STEP_SUMMARY"
