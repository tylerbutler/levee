name: Client Release PR

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          token: ${{ secrets.RELEASE_PAT }}

      - uses: tylerbutler/actions/changie-release@4c6b22106fa7156926918c47847e7d9fbc0e8f9f # ratchet:tylerbutler/actions/changie-release@main
        id: release
        with:
          token: ${{ secrets.RELEASE_PAT }}
          working-directory: client
          projects: levee-driver,levee-client
          labels: release:client
          pr-title-template: 'Release client packages {version}'
          branch-template: 'release/client-next'
          commit-message-template: 'chore(client): release {version}'


      - name: Summary
        if: steps.release.outputs.skipped != 'true'
        env:
          VERSION: ${{ steps.release.outputs.version }}
          PR_URL: ${{ steps.release.outputs.pr-url }}
          PR_OP: ${{ steps.release.outputs.pr-operation }}
          BATCHED: ${{ steps.release.outputs.batched-projects }}
        run: |
          echo "### Client Release PR" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version(s):** $VERSION" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Batched projects:** $BATCHED" >> "$GITHUB_STEP_SUMMARY"
          echo "- **PR:** $PR_URL" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Operation:** $PR_OP" >> "$GITHUB_STEP_SUMMARY"

      - name: Skipped
        if: steps.release.outputs.skipped == 'true'
        run: |
          echo "### Client Release Skipped" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No unreleased client change fragments found." >> "$GITHUB_STEP_SUMMARY"
