name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  server-test:
    name: Server Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_USER: levee
          POSTGRES_PASSWORD: levee
          POSTGRES_DB: levee_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U levee -d levee_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgres://levee:levee@localhost:5432/levee_test
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Setup BEAM
        uses: tylerbutler/actions/setup-gleam@4c6b22106fa7156926918c47847e7d9fbc0e8f9f # ratchet:tylerbutler/actions/setup-gleam@main
        with:
          erlang-version: '28.3'
          gleam-version: '1.14.0'
          elixir-version: '1.18.4'
          rebar-version: '3'
          working-directory: server
          run-deps: false

      - name: Cache Gleam build dirs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # ratchet:actions/cache@v4
        with:
          path: |
            server/levee_protocol/build
            server/levee_auth/build
            server/levee_oauth/build
            server/levee_admin/build
            server/levee_storage/build
            ~/.cache/gleam
          key: gleam-${{ runner.os }}-${{ hashFiles('server/levee_protocol/gleam.toml', 'server/levee_protocol/manifest.toml', 'server/levee_auth/gleam.toml', 'server/levee_auth/manifest.toml', 'server/levee_oauth/gleam.toml', 'server/levee_oauth/manifest.toml', 'server/levee_admin/gleam.toml', 'server/levee_admin/manifest.toml', 'server/levee_storage/gleam.toml', 'server/levee_storage/manifest.toml') }}
          restore-keys: |
            gleam-${{ runner.os }}-

      - name: Cache Mix deps
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # ratchet:actions/cache@v4
        with:
          path: |
            server/deps
            server/_build
          key: mix-${{ runner.os }}-1.18.4-${{ hashFiles('server/mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-1.18.4-

      - name: Install dependencies
        run: just setup-server

      - name: Run tests
        run: |
          just test-server
          cd server && mix test --include postgres

  server-lint:
    name: Server Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Setup BEAM
        uses: tylerbutler/actions/setup-gleam@4c6b22106fa7156926918c47847e7d9fbc0e8f9f # ratchet:tylerbutler/actions/setup-gleam@main
        with:
          erlang-version: '28.3'
          gleam-version: '1.14.0'
          elixir-version: '1.18.4'
          rebar-version: '3'
          working-directory: server
          run-deps: false

      - name: Cache Gleam build dirs
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # ratchet:actions/cache@v4
        with:
          path: |
            server/levee_protocol/build
            server/levee_auth/build
            server/levee_oauth/build
            server/levee_admin/build
            server/levee_storage/build
            ~/.cache/gleam
          key: gleam-${{ runner.os }}-${{ hashFiles('server/levee_protocol/gleam.toml', 'server/levee_protocol/manifest.toml', 'server/levee_auth/gleam.toml', 'server/levee_auth/manifest.toml', 'server/levee_oauth/gleam.toml', 'server/levee_oauth/manifest.toml', 'server/levee_admin/gleam.toml', 'server/levee_admin/manifest.toml', 'server/levee_storage/gleam.toml', 'server/levee_storage/manifest.toml') }}
          restore-keys: |
            gleam-${{ runner.os }}-

      - name: Cache Mix deps
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # ratchet:actions/cache@v4
        with:
          path: |
            server/deps
            server/_build
          key: mix-${{ runner.os }}-1.18.4-${{ hashFiles('server/mix.lock') }}
          restore-keys: |
            mix-${{ runner.os }}-1.18.4-

      - name: Install dependencies
        run: just setup-server

      - name: Lint
        run: just lint-server

  client-test:
    name: Client Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Setup Node.js
        uses: tylerbutler/actions/setup-node@4c6b22106fa7156926918c47847e7d9fbc0e8f9f # ratchet:tylerbutler/actions/setup-node@main
        with:
          working-directory: client
          install-just: false

      - name: Build
        working-directory: client
        run: pnpm build

      - name: Test
        working-directory: client
        run: pnpm test

  client-integration-test:
    name: Client Integration Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Build Levee server image
        run: docker build -t levee-test ./server

      - name: Start Levee server
        run: |
          docker run -d --name levee-server \
            -p 4000:4000 \
            -e PHX_SERVER=true \
            -e PHX_HOST=localhost \
            -e PORT=4000 \
            -e SECRET_KEY_BASE=dev-only-secret-key-base-at-least-64-characters-long-for-phoenix-framework \
            -e LEVEE_TENANT_ID=fluid \
            -e LEVEE_TENANT_KEY=dev-tenant-secret-key \
            levee-test

      - name: Wait for server to be healthy
        run: |
          for i in $(seq 1 30); do
            if wget --spider -q http://localhost:4000/health 2>/dev/null; then
              echo "Server is healthy"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Server failed to start"
          docker logs levee-server
          exit 1

      - name: Setup Node.js
        uses: tylerbutler/actions/setup-node@4c6b22106fa7156926918c47847e7d9fbc0e8f9f # ratchet:tylerbutler/actions/setup-node@main
        with:
          working-directory: client
          install-just: false

      - name: Build client
        working-directory: client
        run: pnpm build

      - name: Run integration tests
        working-directory: client
        run: pnpm test:integration:run
        env:
          LEVEE_HTTP_URL: http://localhost:4000
          LEVEE_SOCKET_URL: ws://localhost:4000/socket
          LEVEE_TENANT_KEY: dev-tenant-secret-key

      - name: Server logs
        if: failure()
        run: docker logs levee-server

  client-lint:
    name: Client Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Setup Node.js
        uses: tylerbutler/actions/setup-node@4c6b22106fa7156926918c47847e7d9fbc0e8f9f # ratchet:tylerbutler/actions/setup-node@main
        with:
          working-directory: client
          install-just: false

      - name: Lint
        working-directory: client
        run: pnpm check

  docker:
    name: Docker Build
    needs: [server-test, client-test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # ratchet:docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # ratchet:docker/setup-buildx-action@v3

      - name: Build image for smoke test
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # ratchet:docker/build-push-action@v6
        with:
          context: ./server
          load: true
          tags: levee-smoke-test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Smoke test - start container
        run: |
          docker run -d --name levee-smoke \
            -p 4000:4000 \
            -e PHX_SERVER=true \
            -e PHX_HOST=localhost \
            -e PORT=4000 \
            -e SECRET_KEY_BASE=dev-only-secret-key-base-at-least-64-characters-long-for-phoenix-framework \
            -e LEVEE_TENANT_ID=fluid \
            -e LEVEE_TENANT_KEY=dev-tenant-secret-key \
            levee-smoke-test

      - name: Smoke test - wait for health check
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://localhost:4000/health >/dev/null 2>&1; then
              echo "Health check passed!"
              exit 0
            fi
            echo "Waiting for server... ($i/30)"
            sleep 2
          done
          echo "Health check failed after 60s"
          docker logs levee-smoke
          exit 1

      - name: Smoke test - cleanup
        if: always()
        run: docker rm -f levee-smoke || true

      - name: Log in to Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # ratchet:docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata (tags, labels)
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # ratchet:docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=ref,event=pr
            type=sha,prefix=

      - name: Build and push Docker image
        uses: docker/build-push-action@263435318d21b8e681c14492fe198d362a7d2c83 # ratchet:docker/build-push-action@v6
        with:
          context: ./server
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
