name: Auto-tag Release

on:
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: write

jobs:
  server-tag:
    if: github.event.pull_request.merged && contains(github.event.pull_request.labels.*.name, 'release:server')
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # ratchet:actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: tylerbutler/actions/changie-auto-tag@d6442585b31f72e73b950f455deab089211ef1ed # ratchet:tylerbutler/actions/changie-auto-tag@main
        with:
          working-directory: server
          tag-prefix: 'server/'
          token: ${{ steps.app-token.outputs.token }}

  client-tag:
    if: github.event.pull_request.merged && contains(github.event.pull_request.labels.*.name, 'release:client')
    runs-on: ubuntu-latest
    steps:
      - name: Generate app token
        id: app-token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # ratchet:actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.RELEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_APP_PRIVATE_KEY }}

      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # ratchet:actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - uses: tylerbutler/actions/changie-auto-tag@d6442585b31f72e73b950f455deab089211ef1ed # ratchet:tylerbutler/actions/changie-auto-tag@main
        id: auto-tag
        with:
          working-directory: client
          projects: levee-driver,levee-client
          token: ${{ steps.app-token.outputs.token }}

      - name: Trigger npm publish
        if: steps.auto-tag.outputs.created-tags != ''
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          CREATED_TAGS: ${{ steps.auto-tag.outputs.created-tags }}
        run: |
          gh workflow run "Client npm Publish" \
            --field tags="$CREATED_TAGS"
