app = "levee-sparkling-breeze-7930"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"
  ignorefile = ".dockerignore"
  # image = "ghcr.io/tylerbutler/levee:latest"

[env]
  PHX_HOST = "levee.fly.dev"
  PHX_SERVER = "true"
  PORT = "4000"
  SECRET_KEY_BASE = "dev-only-secret-key-base-at-least-64-characters-long-for-phoenix-framework"
  LEVEE_TENANT_ID = "fluid"
  LEVEE_TENANT_KEY = "dev-tenant-secret-key"

[http_service]
  internal_port = 4000
  force_https = true
  auto_stop_machines = "suspend"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 1000
    soft_limit = 1000

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
